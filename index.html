<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon/android-chrome-192x192.png">
<link rel="manifest" href="icon/site.webmanifest">
<title>판매량 추이 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #9aa4b2;
    --accent: #5b8cff;
    --good: #4cd964;
    --bad: #ff5c5c;
  }
  body.light {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --muted: #6b7280;
    --accent: #3b6fe0;
    --good: #1f9d4f;
    --bad: #d93a3a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, Roboto, sans-serif;
    padding: 24px;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin-bottom: 4px; line-height: 1.3; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; word-break: break-all; }
  .theme-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .theme-btn:hover { border-color: var(--accent); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    flex: 1 1 160px;
    min-width: 0;
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  .stat .label { color: var(--muted); font-size: 12px; display: flex; align-items: center; }
  .stat .value {
    font-size: 26px;
    font-weight: 700;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #timeStat .value {
    white-space: normal;
    overflow: visible;
    word-break: keep-all;
    line-height: 1.3;
  }

  /* ---- 값이 증가했을 때 잠깐 반짝이는 효과 ---- */
  .stat.flash { animation: flashPulse 1.1s ease; }
  @keyframes flashPulse {
    0%   { background: var(--panel); border-color: var(--border); }
    25%  { background: rgba(76, 217, 100, 0.18); border-color: var(--good); }
    100% { background: var(--panel); border-color: var(--border); }
  }

  /* ---- 살아있음을 보여주는 pulse 점 ---- */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--good);
    margin-left: 6px;
    flex-shrink: 0;
    animation: livePulse 1.8s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%   { box-shadow: 0 0 0 0 rgba(76,217,100,0.55); }
    70%  { box-shadow: 0 0 0 6px rgba(76,217,100,0); }
    100% { box-shadow: 0 0 0 0 rgba(76,217,100,0); }
  }

  .chart-wrap { position: relative; width: 100%; height: 320px; overflow: hidden; }
  .chart-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
  }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -20px; padding: 0 20px; }
  table { width: 100%; min-width: 420px; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; }
  code { color: var(--accent); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; background: #23324f; color: var(--accent); margin-left: 8px;
    white-space: nowrap;
  }
  body.light .badge { background: #e8edff; }
  .best-badge {
    display: none;
    font-size: 11px;
    background: rgba(76,217,100,0.14);
    color: var(--good);
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
    vertical-align: middle;
    white-space: nowrap;
  }

  /* ---- 전일 대비 증감 배지 ---- */
  .change {
    display: inline-block;
    font-size: 11px;
    margin-left: 6px;
    padding: 1px 7px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .change.up   { color: var(--good); background: rgba(76,217,100,0.12); }
  .change.down { color: var(--bad);  background: rgba(255,92,92,0.12); }
  .change.flat { color: var(--muted); background: rgba(154,164,178,0.12); }

  /* ---- 옵션별 판매 경쟁 (레이스 바) ---- */
  .race-row { margin-bottom: 16px; }
  .race-row:last-child { margin-bottom: 0; }
  .race-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    margin-bottom: 6px;
    gap: 8px;
  }
  .race-name { font-weight: 600; }
  .race-value { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .race-track {
    position: relative;
    height: 24px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .race-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    border-radius: 999px;
    transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .race-fill.leader {
    box-shadow: 0 0 14px rgba(91, 140, 255, 0.55);
  }

  #status { color: var(--muted); font-size: 13px; }

  /* ---- 반응하는 마스코트 캐릭터 ---- */
  .mascot-wrap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  .mascot-bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 10px;
    margin-bottom: 6px;
    max-width: 160px;
    text-align: center;
    opacity: 0;
    transform: translateY(6px) scale(0.9);
    transition: opacity 0.3s ease, transform 0.3s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .mascot-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  #mascotSvg { filter: drop-shadow(0 4px 10px rgba(0,0,0,0.25)); }

  @keyframes mascotBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .mascot-body-anim { animation: mascotBob 2.4s ease-in-out infinite; }

  @keyframes mascotBounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.15, 0.85) translateY(4px); }
    50% { transform: scale(0.9, 1.15) translateY(-10px); }
    70% { transform: scale(1.05, 0.95); }
    100% { transform: scale(1); }
  }
  .mascot-bounce { animation: mascotBounce 0.6s ease; }

  @keyframes mascotSad {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(4px) rotate(-3deg); }
  }
  .mascot-sad { animation: mascotSad 1.6s ease-in-out infinite; }

  @keyframes mascotEcstatic {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-8deg) scale(1.08); }
    75% { transform: rotate(8deg) scale(1.08); }
  }
  .mascot-ecstatic { animation: mascotEcstatic 0.5s ease-in-out 3; }

  @media (max-width: 640px) {
    .mascot-wrap { bottom: 12px; right: 12px; }
    #mascotSvg { width: 56px; height: 56px; }
  }

  /* ---- Mobile breakpoints ---- */
  @media (max-width: 640px) {
    body { padding: 14px; }
    h1 { font-size: 17px; }
    .sub { font-size: 12px; margin-bottom: 16px; }
    .card { padding: 14px; border-radius: 10px; margin-bottom: 14px; }
    .stat-row { gap: 8px; margin-bottom: 14px; }
    .stat {
      flex: 1 1 calc(50% - 8px);
      padding: 12px 14px;
      border-radius: 10px;
    }
    .stat .label { font-size: 11px; }
    .stat .value { font-size: 19px; }
    #timeStat .value { font-size: 14px; }
    .stat#timeStat { flex: 1 1 100%; }
    .chart-wrap { height: 240px; }
    table { font-size: 12px; }
    th, td { padding: 6px; }
    h3 { font-size: 15px; }
    .race-label { font-size: 12px; }
    .race-track { height: 20px; }
  }

  @media (max-width: 380px) {
    .stat { flex: 1 1 100%; }
  }
</style>
</head>
<body>
  <div class="header-row">
    <div>
      <h1>상품 판매량 추이 <span class="badge">60분 주기 갱신</span></h1>
      <p class="sub">product_id: 133850457 · data/history.json 기준</p>
    </div>
    <button class="theme-btn" id="themeToggle" type="button">☀️ 라이트모드</button>
  </div>

  <div class="stat-row">
    <div class="stat" id="valueStat">
      <div class="label">총 판매량</div>
      <div class="value" id="latestValue">-</div>
    </div>
    <div class="stat" id="velocityStat">
      <div class="label">최근 1시간 판매량</div>
      <div class="value" id="velocityValue">-</div>
    </div>
    <div class="stat" id="amountStat">
      <div class="label">총 판매금액</div>
      <div class="value" id="latestAmount">-</div>
    </div>
    <div class="stat" id="timeStat">
      <div class="label">마지막 갱신 시각 <span class="live-dot"></span></div>
      <div class="value" id="latestTime">-</div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">오늘 판매량 추이 <span class="best-badge" id="bestHourBadge"></span></h3>
    <div class="chart-wrap">
      <canvas id="salesChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">옵션별 판매 비중</h3>
    <div id="raceContainer"></div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">옵션별 현황 (최신 기준)</h3>
    <div class="table-scroll">
      <table id="optionTable">
        <thead><tr><th>옵션</th><th>가격</th><th>판매량</th><th>판매금액</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">일별 판매량</h3>
    <div class="table-scroll">
      <table id="dailyTable">
        <thead><tr><th>날짜</th><th>일일 판매량</th><th>누적 판매량</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <p id="status">불러오는 중...</p>

  <div class="mascot-wrap" id="mascotWrap">
    <div class="mascot-bubble" id="mascotBubble"></div>
    <svg id="mascotSvg" viewBox="0 0 120 120" width="72" height="72">
      <circle id="mascotBody" cx="60" cy="65" r="45" fill="#5b8cff"/>
      <circle cx="42" cy="55" r="7" fill="#1a1d23"/>
      <circle cx="78" cy="55" r="7" fill="#1a1d23"/>
      <path id="mascotMouth" d="M 40 80 Q 60 95 80 80" stroke="#1a1d23" stroke-width="4" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

<script>
// ---- 테마 토글 ----
const themeToggleBtn = document.getElementById('themeToggle');

function applyTheme(theme) {
  document.body.classList.toggle('light', theme === 'light');
  themeToggleBtn.textContent = theme === 'light' ? '🌙 다크모드' : '☀️ 라이트모드';
}

const savedTheme = localStorage.getItem('dashboard-theme') || 'dark';
applyTheme(savedTheme);

themeToggleBtn.addEventListener('click', () => {
  const current = document.body.classList.contains('light') ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('dashboard-theme', next);
  applyTheme(next);
  if (window._lastRecords) render(window._lastRecords); // 차트 색상도 새 테마로 다시 그림
});

function cssVar(name) {
  return getComputedStyle(document.body).getPropertyValue(name).trim();
}

async function load() {
  const statusEl = document.getElementById('status');
  try {
    const res = await fetch('./data/history.json?_=' + Date.now());
    if (!res.ok) throw new Error('history.json 로드 실패: ' + res.status);
    const data = await res.json();
    render(data.records || []);
    statusEl.textContent = '마지막 새로고침: ' + new Date().toLocaleString('ko-KR');
  } catch (e) {
    statusEl.textContent = '오류: ' + e.message;
  }
}

function formatWon(n) {
  return n.toLocaleString('ko-KR') + '원';
}

function isMobile() {
  return window.innerWidth <= 640;
}

function dateKeyKST(ts) {
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ---- 숫자 카운트업 애니메이션 ----
function animateValue(el, start, end, duration, formatter) {
  if (start === end) {
    el.textContent = formatter(end);
    return;
  }
  const range = end - start;
  const startTime = performance.now();
  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 2); // ease-out
    const value = Math.round(start + range * eased);
    el.textContent = formatter(value);
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = formatter(end);
    }
  }
  requestAnimationFrame(step);
}

// ---- 값 증가 시 카드에 반짝임 효과 ----
function flashCard(el) {
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth; // 리플로우 강제 (애니메이션 재시작용)
  el.classList.add('flash');
}

// ---- 약 1시간 전 기록 찾기 (판매 속도 계산용) ----
function findBaselineRecord(records, latestTs) {
  const targetTime = new Date(latestTs).getTime() - 60 * 60 * 1000;
  let best = null;
  for (const r of records) {
    const t = new Date(r.timestamp).getTime();
    if (t <= targetTime) {
      if (!best || t > new Date(best.timestamp).getTime()) best = r;
    }
  }
  return best;
}

// ---- 오늘 중 가장 많이 팔린 시간대 찾기 ----
function computeBestHour(records) {
  if (records.length < 2) return null;
  let best = null;
  for (let i = 1; i < records.length; i++) {
    const diff = records[i].sales_value - records[i - 1].sales_value;
    if (!best || diff > best.diff) {
      const d = new Date(records[i].timestamp);
      best = { diff, label: `${String(d.getHours()).padStart(2, '0')}시` };
    }
  }
  return best;
}

// ---- 옵션별 판매 경쟁 레이스 바 렌더링 ----
const RACE_COLORS = ['#5b8cff', '#ff9f5b', '#4cd964', '#ff5c5c', '#a276ff', '#ffd166'];

function renderRaceChart(optionSource) {
  const container = document.getElementById('raceContainer');
  container.innerHTML = '';
  if (!optionSource.length) return;

  const total = optionSource.reduce((s, o) => s + (o.saleCnt || 0), 0) || 1;
  const maxVal = Math.max(...optionSource.map(o => o.saleCnt || 0));

  optionSource.forEach((opt, i) => {
    const val = opt.saleCnt || 0;
    const pct = total ? (val / total) * 100 : 0;
    const isLeader = maxVal > 0 && val === maxVal;

    const row = document.createElement('div');
    row.className = 'race-row';
    row.innerHTML = `
      <div class="race-label">
        <span class="race-name">${isLeader ? '👑 ' : ''}${opt.label ?? ''} ${opt.value ?? ''}</span>
        <span class="race-value">${val.toLocaleString('ko-KR')}개 · ${pct.toFixed(1)}%</span>
      </div>
      <div class="race-track">
        <div class="race-fill${isLeader ? ' leader' : ''}" style="background:${RACE_COLORS[i % RACE_COLORS.length]}"></div>
      </div>
    `;
    container.appendChild(row);

    const fillEl = row.querySelector('.race-fill');
    // 더블 rAF로 브라우저가 0% 상태를 먼저 그린 뒤 목표 폭으로 트랜지션 시키도록 보장
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fillEl.style.width = pct + '%';
      });
    });
  });
}

// ---- 반응하는 마스코트 캐릭터 ----
const MASCOT_PHRASES = {
  ecstatic: ['대박 터졌다!! 🎉', '이 속도 미쳤어요!', '오늘 완전 신기록 각!'],
  happy: ['오, 잘 팔리는데요?', '순항 중이에요 👍', '좋아 좋아~'],
  neutral: ['음... 조용하네요', '잠잠한 시간이에요', '다음 판매를 기다리는 중'],
  sad: ['어... 요즘 왜 이래요 😢', '힘내야 할 때예요', '잠깐 주춤한 것 같아요'],
};

const MASCOT_LOOK = {
  ecstatic: { color: '#ffcc33', mouth: 'M 36 75 Q 60 100 84 75' },
  happy:    { color: '#4cd964', mouth: 'M 40 78 Q 60 92 80 78' },
  neutral:  { color: '#9aa4b2', mouth: 'M 42 82 L 78 82' },
  sad:      { color: '#6b7ea8', mouth: 'M 40 88 Q 60 74 80 88' },
};

let mascotMaxVelocity = 0;

function updateMascot(velocity) {
  const svg = document.getElementById('mascotSvg');
  const body = document.getElementById('mascotBody');
  const mouth = document.getElementById('mascotMouth');
  const bubble = document.getElementById('mascotBubble');
  if (typeof velocity !== 'number') return;

  let mood;
  if (velocity > 0 && velocity >= mascotMaxVelocity) {
    mood = 'ecstatic';
    mascotMaxVelocity = velocity;
  } else if (velocity > 0) {
    mood = 'happy';
  } else if (velocity === 0) {
    mood = 'neutral';
  } else {
    mood = 'sad';
  }

  const look = MASCOT_LOOK[mood];
  body.setAttribute('fill', look.color);
  mouth.setAttribute('d', look.mouth);

  svg.classList.remove('mascot-bounce', 'mascot-sad', 'mascot-ecstatic', 'mascot-body-anim');
  void svg.offsetWidth;
  if (mood === 'ecstatic') svg.classList.add('mascot-ecstatic');
  else if (mood === 'sad') svg.classList.add('mascot-sad');
  else svg.classList.add('mascot-body-anim');
  if (mood === 'happy' || mood === 'ecstatic') {
    setTimeout(() => svg.classList.add('mascot-bounce'), 50);
  }

  const phrases = MASCOT_PHRASES[mood];
  bubble.textContent = phrases[Math.floor(Math.random() * phrases.length)];
  bubble.classList.add('show');
  clearTimeout(window._mascotBubbleTimer);
  window._mascotBubbleTimer = setTimeout(() => bubble.classList.remove('show'), 4000);
}

function render(records) {
  window._lastRecords = records;

  const withValue = records.filter(r => typeof r.sales_value === 'number');
  function formatLabel(ts, mobile) {
    const d = new Date(ts);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return mobile ? `${mm}/${dd} ${hh}:${mi}` : `${mm}.${dd} ${hh}:${mi}`;
  }

  const mobile = isMobile();

  // ---- 오늘 데이터만 그래프에 표시 ----
  const todayKey = dateKeyKST(new Date());
  const todayRecords = withValue.filter(r => dateKeyKST(r.timestamp) === todayKey);

  const labels = todayRecords.map(r => formatLabel(r.timestamp, mobile));
  const values = todayRecords.map(r => r.sales_value);

  // ---- 오늘 최고 판매 시간대 배지 ----
  const bestHour = computeBestHour(todayRecords);
  const bestHourBadge = document.getElementById('bestHourBadge');
  if (bestHour && bestHour.diff > 0) {
    bestHourBadge.textContent = `🏆 오늘 최고 ${bestHour.diff.toLocaleString('ko-KR')}개 (${bestHour.label})`;
    bestHourBadge.style.display = 'inline-block';
  } else {
    bestHourBadge.style.display = 'none';
  }

  if (withValue.length > 0) {
    const lastAll = withValue[withValue.length - 1];
    const newSales = lastAll.sales_value;
    const latestValueEl = document.getElementById('latestValue');
    const prevSales = window._lastSalesValue;

    if (typeof prevSales === 'number') {
      animateValue(latestValueEl, prevSales, newSales, 700, n => n.toLocaleString('ko-KR'));
      if (newSales > prevSales) {
        flashCard(document.getElementById('valueStat'));
      }
    } else {
      latestValueEl.textContent = newSales.toLocaleString('ko-KR');
    }
    window._lastSalesValue = newSales;

    document.getElementById('latestTime').textContent = formatLabel(lastAll.timestamp, mobile);

    // ---- 최근 1시간 판매 속도 ----
    const baseline = findBaselineRecord(withValue, lastAll.timestamp);
    const velocityEl = document.getElementById('velocityValue');
    if (baseline) {
      const velocity = newSales - baseline.sales_value;
      velocityEl.textContent = (velocity >= 0 ? '+' : '') + velocity.toLocaleString('ko-KR');
      velocityEl.style.color = velocity > 0 ? 'var(--good)' : (velocity < 0 ? 'var(--bad)' : '');
      updateMascot(velocity);
    } else {
      velocityEl.textContent = '-';
      velocityEl.style.color = '';
    }
  } else if (records.length > 0) {
    document.getElementById('latestTime').textContent = new Date(records[records.length - 1].timestamp).toLocaleString('ko-KR');
  }

  const latest = records[records.length - 1];
  if (latest) {
    if (typeof latest.amount_value === 'number') {
      const amountEl = document.getElementById('latestAmount');
      const prevAmount = window._lastAmountValue;
      const newAmount = latest.amount_value;
      if (typeof prevAmount === 'number') {
        animateValue(amountEl, prevAmount, newAmount, 700, formatWon);
        if (newAmount > prevAmount) {
          flashCard(document.getElementById('amountStat'));
        }
      } else {
        amountEl.textContent = formatWon(newAmount);
      }
      window._lastAmountValue = newAmount;
    }
    const tbody = document.querySelector('#optionTable tbody');
    tbody.innerHTML = '';
    (latest.options || []).forEach(opt => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${opt.label ?? ''} - ${opt.value ?? ''}</td><td>${formatWon(opt.price ?? 0)}</td><td>${opt.saleCnt ?? ''}</td><td>${formatWon(opt.amount ?? 0)}</td>`;
      tbody.appendChild(tr);
    });
  }

  // ---- 옵션별 판매 경쟁 (레이스 바) ----
  renderRaceChart(latest && latest.options ? latest.options : []);

  // ---- 일별 판매량 요약 표 ----
  const dailyMap = new Map();
  withValue.forEach(r => {
    dailyMap.set(dateKeyKST(r.timestamp), r); // 시간순 정렬 가정, 그날의 마지막 기록으로 덮어씀
  });
  const dailyKeys = Array.from(dailyMap.keys()).sort();
  const dailyRows = [];
  let prevTotal = null;
  let prevDiff = null;
  dailyKeys.forEach(key => {
    const rec = dailyMap.get(key);
    const total = rec.sales_value;
    const diff = prevTotal === null ? total : total - prevTotal;

    let changeBadge = '';
    if (prevDiff !== null && prevDiff !== 0) {
      const pct = ((diff - prevDiff) / prevDiff) * 100;
      const arrow = pct > 0.05 ? '▲' : (pct < -0.05 ? '▼' : '－');
      const cls = pct > 0.05 ? 'up' : (pct < -0.05 ? 'down' : 'flat');
      changeBadge = `<span class="change ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</span>`;
    }

    dailyRows.push({ key, diff, total, changeBadge });
    prevTotal = total;
    prevDiff = diff;
  });
  const dailyBody = document.querySelector('#dailyTable tbody');
  dailyBody.innerHTML = '';
  dailyRows.slice().reverse().forEach(row => { // 최신 날짜가 위로 오도록
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.key}</td><td>${row.diff.toLocaleString('ko-KR')} ${row.changeBadge}</td><td>${row.total.toLocaleString('ko-KR')}</td>`;
    dailyBody.appendChild(tr);
  });

  // ---- 판매량 추이 라인 차트 ----
  const textColor = cssVar('--text');
  const mutedColor = cssVar('--muted');
  const borderColor = cssVar('--border');
  const accentColor = cssVar('--accent') || '#5b8cff';

  const ctx = document.getElementById('salesChart');
  if (window._chart) window._chart.destroy();
  window._chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '오늘 판매량 (saleCnt 합계)',
        data: values,
        borderColor: accentColor,
        backgroundColor: 'rgba(91,140,255,0.15)',
        tension: 0.25,
        fill: true,
        pointRadius: 2,
        pointHitRadius: isMobile() ? 20 : 8,
        borderWidth: isMobile() ? 1.5 : 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        legend: {
          labels: {
            color: textColor,
            font: { size: isMobile() ? 11 : 12 },
            boxWidth: isMobile() ? 12 : 40,
          }
        },
        tooltip: {
          enabled: true,
          mode: 'index',
          intersect: false,
          callbacks: {
            label: (item) => '판매량: ' + item.parsed.y,
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: mutedColor,
            font: { size: isMobile() ? 10 : 12 },
            maxRotation: isMobile() ? 45 : 0,
            autoSkip: true,
            maxTicksLimit: isMobile() ? 6 : 12,
          },
          grid: { color: borderColor }
        },
        y: {
          ticks: {
            color: mutedColor,
            font: { size: isMobile() ? 10 : 12 },
            stepSize: 1,
            precision: 0,
          },
          grid: { color: borderColor }
        },
      }
    }
  });

  // 모바일에서 초기 레이아웃이 늦게 잡히는 경우를 대비한 강제 리사이즈
  requestAnimationFrame(() => {
    if (window._chart) window._chart.resize();
  });
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(load, 200);
});

load();
setInterval(load, 60 * 1000);
</script>
</body>
</html>
